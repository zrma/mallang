name: mallang
language: rust
primary_entrypoints:
  - README.md
  - SPEC.md
  - ROADMAP.md
  - docs/V1_LANGUAGE_CONTRACT.md
  - docs/COMPATIBILITY.md
  - docs/MIGRATION_V1.md
  - docs/SELF_HOSTING.md
  - docs/conformance/v1-rules.json
  - docs/agent-harness.md
  - docs/HANDOFF.md
  - docs/ROADMAP.md
commands:
  check_agent_harness: scripts/check-agent-harness-interface.sh
  check: scripts/check.sh
  check_test_workflow: scripts/check-test-workflow.sh target/debug/mlg
  check_streaming_file_io: scripts/check-streaming-file-io-runtime.sh
  check_self_hosting_bootstrap: scripts/check-self-hosting-bootstrap.sh
  check_self_hosting_gate_interface: scripts/check-self-hosting-gate-interface.sh
  check_self_hosting_lexer: scripts/check-self-hosting-lexer.sh
  check_self_hosting_fast: scripts/check-self-hosting-lexer.sh --fast
  check_self_hosting_focused: scripts/check-self-hosting-lexer.sh --focus <area>
  check_self_hosting_backend: scripts/check-self-hosting-backend.sh
  check_self_hosting_backend_reuse: scripts/check-self-hosting-backend.sh --assume-bootstrap
  check_self_hosting_string_cursor: scripts/check-self-hosting-string-cursor.sh target/mallang/string-cursor.c
  check_path_dependencies: scripts/check-path-dependencies.sh target/debug/mlg
  check_diagnostics: scripts/check-diagnostics.sh target/debug/mlg
  check_parser_recovery: scripts/check-parser-recovery.sh target/debug/mlg
  check_v1_conformance: python3 scripts/check-v1-conformance.py
  check_v1_migration: scripts/check-v1-migration.sh target/debug/mlg
  check_hardening_properties: cargo test --test hardening_properties
  check_hardening_corpus: scripts/check-hardening-corpus.sh target/debug/mlg
  check_v08_reproducibility: scripts/check-v08-reproducibility.sh target/debug/mlg
  check_v08_acceptance: scripts/check-v08-acceptance.sh
  check_v09_freeze: python3 scripts/check-v09-freeze.py
  check_v09_acceptance: scripts/check-v09-acceptance.sh
  check_v1_rc_rehearsal: scripts/check-v1-rc-rehearsal.sh
  check_v1_rc_acceptance: scripts/check-v1-rc-acceptance.sh
  check_v1_stable_rehearsal: scripts/check-v1-stable-rehearsal.sh
  check_v1_stable_acceptance: scripts/check-v1-stable-acceptance.sh
  check_v1x_acceptance: scripts/check-v1x-acceptance.sh
  check_v1x_upgrade: scripts/check-v1x-upgrade.sh
  measure_v08_baseline: cargo build --release --bin mlg && scripts/measure-v08-baseline.py --compiler target/release/mlg --output docs/baselines/v0.8-performance.json
  check_release_artifacts: scripts/check-release-artifacts.sh
  check_v07_acceptance: scripts/check-v07-acceptance.sh
  check_v09_dogfood: scripts/check-v09-dogfood.sh
  check_release_binary: scripts/check-release-binary.sh
  check_release_helpers: scripts/check-release-helpers.sh
  deep_generated_c_sanitizers: scripts/check-generated-c-sanitizers.sh
  verify_v0_rc: scripts/verify-v0-rc.sh
  verify_publish_readiness: scripts/finalize-and-push.sh --verify-only
  finalize_and_push_after_approval: scripts/finalize-and-push.sh
  format: cargo fmt --all --check
  test: cargo test --workspace
  clippy: cargo clippy --workspace --all-targets -- -D warnings
  lexer_smoke: cargo run --bin mlg -- lex examples/hello.mlg
vcs:
  system: jj
  default_bookmark: main
agent_workflow:
  todo_glob: docs/todo-*
  required_todo_files:
    - spec.md
    - open-questions.md
