name: mallang
language: rust
primary_entrypoints:
  - README.md
  - SPEC.md
  - ROADMAP.md
  - docs/agent-harness.md
  - docs/HANDOFF.md
  - docs/ROADMAP.md
commands:
  check_agent_harness: scripts/check-agent-harness-interface.sh
  check: scripts/check.sh
  check_test_workflow: scripts/check-test-workflow.sh target/debug/mlg
  check_path_dependencies: scripts/check-path-dependencies.sh target/debug/mlg
  check_diagnostics: scripts/check-diagnostics.sh target/debug/mlg
  check_release_artifacts: scripts/check-release-artifacts.sh
  check_v07_acceptance: scripts/check-v07-acceptance.sh
  check_release_binary: scripts/check-release-binary.sh
  check_release_helpers: scripts/check-release-helpers.sh
  deep_generated_c_sanitizers: scripts/check-generated-c-sanitizers.sh
  verify_v0_rc: scripts/verify-v0-rc.sh
  verify_publish_readiness: scripts/finalize-and-push.sh --verify-only
  finalize_and_push_after_approval: scripts/finalize-and-push.sh
  format: cargo fmt --all --check
  test: cargo test --workspace
  clippy: cargo clippy --workspace --all-targets -- -D warnings
  lexer_smoke: cargo run --bin mlg -- lex examples/hello.mlg
vcs:
  system: jj
  default_bookmark: main
agent_workflow:
  todo_glob: docs/todo-*
  required_todo_files:
    - spec.md
    - open-questions.md
