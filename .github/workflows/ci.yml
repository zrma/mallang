name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1a3a6d54512beeaffd394f8d516ca16f2c506a20
        with:
          components: rustfmt, clippy

      - name: Install repository check tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep

      - name: Run repository checks
        run: scripts/check.sh
